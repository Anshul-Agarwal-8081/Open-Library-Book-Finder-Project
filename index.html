<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>📚 Book Finder</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-animation" id="bgAnimation"></div>

  <div class="counter-badge" id="counterBadge">
    📖 Books Read: <strong id="counterNum">0</strong>
  </div>

  <div class="wrapper">
    <header class="header">
      <h1>📚 Book Finder</h1>
      <p>Search millions of titles from the Open Library</p>
    </header>

    <div class="search-section">
      <div class="search-bar">
        <input
          type="text"
          id="searchInput"
          placeholder="Search by title, author…"
        />
        <button id="searchBtn">Search</button>
      </div>

      <div class="quick-tags">
        <span>Popular:</span>
        <button class="tag" data-q="Harry Potter">Harry Potter</button>
        <button class="tag" data-q="Dune">Dune</button>
        <button class="tag" data-q="George Orwell">Orwell</button>
        <button class="tag" data-q="Agatha Christie">Christie</button>
        <button class="tag" data-q="Stephen King">S. King</button>
      </div>
    </div>

    <div class="status-msg" id="statusMsg"></div>

    <div class="results-grid" id="resultsGrid"></div>
  </div>

  <template id="cardTemplate">
    <div class="card">
      <div class="card-img-wrap">
        <img class="card-img" src="" alt="" />
        <span class="card-year"></span>
      </div>
      <div class="card-body">
        <h3 class="card-title"></h3>
        <p class="card-author"></p>
        <button class="read-btn">✓ I've Read This</button>
      </div>
    </div>
  </template>

  <script src="script.js"></script>
</body>
</html>
